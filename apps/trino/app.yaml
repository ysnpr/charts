apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trino
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://trinodb.github.io/charts
    chart: trino
    targetRevision: 1.42.1

    helm:
      valueFiles:
        - values.yaml

  destination:
    namespace: trino
    server: https://kubernetes.default.svc

  syncPolicy:
    syncOptions:
      - CreateNamespace=true