apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: trino
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://github.com/ysnpr/charts.git
    targetRevision: main
    path: apps/trino

    helm:
      valueFiles:
        - values.yaml

  destination:
    namespace: trino
    server: https://kubernetes.default.svc

  syncPolicy:
    syncOptions:
      - CreateNamespace=true