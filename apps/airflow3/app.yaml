apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow3
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://airflow.apache.org
    chart: airflow
    targetRevision: 1.19.0

    helm:
      parameters:
        - name: createUserJob.useHelmHooks
          value: "false"
        - name: migrateDatabaseJob.useHelmHooks
          value: "false"
        - name: config.core.load_examples
          value: "true"
        - name: config.api.expose_config
          value: 'true'

  destination:
    server: https://kubernetes.default.svc
    namespace: airflow3

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true