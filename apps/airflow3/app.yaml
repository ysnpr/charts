apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: airflow
  namespace: argocd

spec:
  project: default

  source:
    repoURL: https://airflow.apache.org
    chart: airflow
    targetRevision: 1.19.0

    helm:
      valueFiles:
        - values.yaml

  destination:
    server: https://kubernetes.default.svc
    namespace: airflow3

  syncPolicy:
    automated:
      prune: true
      selfHeal: true